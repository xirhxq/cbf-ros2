# tmuxinator.cbf-ros2.yml
name: cbf-ros2
root: .
tmux_options: -f .tmux.conf
on_project_start: set -e && colcon build
windows:
  - suav-and-launch:
      panes:
        - monitor:
            - . install/setup.bash
            - . src/cbf-ros2/setenv.sh
            - sleep 25
            - ros2 run cbf-ros2 monitor $UAV_NUM
        - suav:
            - . install/setup.bash
            - . src/cbf-ros2/setenv.sh
            - sleep 20
            - ros2 run cbf-ros2 suav
        - simulation:
            - . src/cbf-ros2/patch_uav_speed.sh 25
            - ros2 launch mbzirc_ros competition_local.launch.py ign_args:="-v 4 -r coast.sdf"
        - spawn:
            - . install/setup.bash
            - . src/cbf-ros2/setenv.sh
            - ros2 launch cbf-ros2 spawn.launch.py numbers:=$UAV_NUM
        - pose-bridge:
            - . install/setup.bash
            - . src/cbf-ros2/setenv.sh
            - ros2 run cbf-ros2 pose_bridge $UAV_NUM
