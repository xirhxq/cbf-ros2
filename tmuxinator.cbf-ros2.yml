# tmuxinator.cbf-ros2.yml
name: cbf-ros2
root: .
tmux_options: -f .tmux.conf
on_project_start: |
  set -e
  colcon build

  # Patch MBZIRC settings (only runs once due to marker files)
  bash src/cbf-ros2/scripts/patch_uav_speed.sh 50
  bash src/cbf-ros2/scripts/patch_geofence_height.sh 400

  # Recompile mbzirc_ign if any patches were applied
  if [ -f "$HOME/.uav_speed_patched" ] || [ -f "$HOME/.geofence_height_patched" ]; then
    echo "Recompiling mbzirc_ign..."
    bash -c 'cd ~/mbzirc_ws && source /opt/ros/galactic/setup.bash && colcon build --packages-select mbzirc_ign --merge-install'
  fi
windows:
  - suav-and-launch:
      panes:
        - monitor:
            - . install/setup.bash
            - . src/cbf-ros2/scripts/setenv.sh
            - sleep 25
            - ros2 run cbf-ros2 monitor $UAV_NUM
        - suav:
            - . install/setup.bash
            - . src/cbf-ros2/scripts/setenv.sh
            - sleep 20
            - ros2 run cbf-ros2 suav
        - simulation:
            - ros2 launch mbzirc_ros competition_local.launch.py ign_args:="-v 4 -r coast.sdf"
        - spawn:
            - . install/setup.bash
            - . src/cbf-ros2/scripts/setenv.sh
            - ros2 launch cbf-ros2 spawn.launch.py numbers:=$UAV_NUM
        - pose-bridge:
            - . install/setup.bash
            - . src/cbf-ros2/scripts/setenv.sh
            - ros2 run cbf-ros2 pose_bridge $UAV_NUM
